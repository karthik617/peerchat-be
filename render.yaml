services:
  - type: web
    name: peerchat-server
    runtime: node
    region: singapore          # change to: oregon, ohio, frankfurt, virginia
    plan: free                 # upgrade to starter ($7/mo) for always-on
    rootDir: backend
    buildCommand: npm ci --only=production
    startCommand: node server.js
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: HOST
        value: 0.0.0.0
      - key: REDIS_URL
        fromService:
          name: peerchat-redis
          type: redis
          property: connectionString
      - key: QUEUE_TTL_SEC
        value: 604800
      - key: PRESENCE_TTL_SEC
        value: 60
      - key: RATE_LIMIT
        value: 60
      - key: RATE_WINDOW_MS
        value: 10000
      - key: MAX_MSG_BYTES
        value: 65536
      - key: MAX_CONTENT_LEN
        value: 4096
      - key: PING_INTERVAL_MS
        value: 25000
      - key: INSTANCE_ID
        generateValue: true     # Render auto-generates a unique value

databases:
  - type: redis
    name: peerchat-redis
    region: singapore          # must match the web service region
    plan: free                 # free = 25MB, no persistence — upgrade for prod
    maxmemoryPolicy: allkeys-lru